<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>NFT Game Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎮 NFT Mini Game</h1>
  <p>Puan kazan, NFT elde et!</p>

  <div id="score">Skor: 0</div>

  <button id="playBtn">Oyna</button>

  <div id="nft" class="hidden">
    <h2>🎉 NFT Kazandın!</h2>
    <div class="nft-card">
      <p><strong>ID:</strong> <span id="nftId"></span></p>
      <p><strong>Rarity:</strong> <span id="nftRarity"></span></p>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
